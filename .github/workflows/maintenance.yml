name: Backend Maintenance

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  dependency-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run regression tests
        run: mvn -B test
        working-directory: apps/backend/pokemon-ingestion

      - name: Report dependency and plugin updates
        run: mvn -B versions:display-dependency-updates versions:display-plugin-updates
        working-directory: apps/backend/pokemon-ingestion
