spring:
  application:
    name: pokemon-ingestion
  datasource:
    url: jdbc:h2:mem:pokemon;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

pokeapi:
  base-url: https://pokeapi.co/api/v2
  page-size: 20
